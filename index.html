<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Segoe UI',sans-serif;
}

body{
  height:100vh;
  overflow:hidden;
  background:#070b14;
  display:flex;
  justify-content:center;
  align-items:center;
  color:white;
}

canvas{
  position:fixed;
  top:0;
  left:0;
  z-index:0;
}

.card{
  position:relative;
  z-index:10;
  width:90%;
  max-width:360px;
  padding:40px;
  border-radius:20px;
  background:rgba(0,255,255,0.05);
  backdrop-filter:blur(20px);
  box-shadow:0 0 25px rgba(0,255,255,0.4);
  border:1px solid rgba(0,255,255,0.4);
  display:flex;
  flex-direction:column;
  gap:15px;
  animation:fadeIn 1s ease;
}

@keyframes fadeIn{
  from{opacity:0; transform:translateY(20px);}
  to{opacity:1; transform:translateY(0);}
}

h2{
  text-align:center;
  color:#00ffff;
}

input{
  padding:12px;
  border-radius:10px;
  border:1px solid rgba(0,255,255,0.3);
  background:transparent;
  color:white;
  outline:none;
}

input:focus{
  box-shadow:0 0 10px cyan;
}

button{
  padding:12px;
  border:none;
  border-radius:10px;
  background:#00ffff;
  color:#000;
  font-weight:bold;
  cursor:pointer;
  transition:0.3s;
}

button:hover{
  box-shadow:0 0 20px #00ffff;
  transform:translateY(-2px);
}

.links{
  display:flex;
  justify-content:space-between;
  font-size:13px;
}

.links a{
  color:#00ffff;
  text-decoration:none;
}
</style>
</head>
<body>

<canvas id="bg"></canvas>

<div class="card">
<h2>Login</h2>
<input type="email" id="email" placeholder="E-mail">
<input type="password" id="password" placeholder="Senha">
<button onclick="login()">Entrar</button>

<div class="links">
<a href="#" onclick="forgotPassword()">Esqueceu senha?</a>
<a href="register.html">Criar conta</a>
</div>
</div>

<script>

/* ================= PARTICULAS ================= */

const canvas=document.getElementById("bg");
const ctx=canvas.getContext("2d");

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let particles=[];
const particleCount=220;
const mouse={x:null,y:null,radius:180};

window.addEventListener("resize",()=>{
  canvas.width=window.innerWidth;
  canvas.height=window.innerHeight;
  init();
});

window.addEventListener("mousemove",(e)=>{
  mouse.x=e.x;
  mouse.y=e.y;
});

class Particle{
  constructor(){
    this.x=Math.random()*canvas.width;
    this.y=Math.random()*canvas.height;
    this.size=2;
    this.speedX=(Math.random()-0.5)*0.7;
    this.speedY=(Math.random()-0.5)*0.7;
  }

  update(){
    this.x+=this.speedX;
    this.y+=this.speedY;

    if(this.x>canvas.width||this.x<0) this.speedX*=-1;
    if(this.y>canvas.height||this.y<0) this.speedY*=-1;

    const dx=this.x-mouse.x;
    const dy=this.y-mouse.y;
    const distance=Math.sqrt(dx*dx+dy*dy);

    if(distance<mouse.radius){
      const force=(mouse.radius-distance)/mouse.radius;
      const angle=Math.atan2(dy,dx);
      this.x+=Math.cos(angle)*force*8;
      this.y+=Math.sin(angle)*force*8;
    }
  }

  draw(){
    ctx.fillStyle="#00ffff";
    ctx.beginPath();
    ctx.arc(this.x,this.y,this.size,0,Math.PI*2);
    ctx.fill();
  }
}

function init(){
  particles=[];
  for(let i=0;i<particleCount;i++){
    particles.push(new Particle());
  }
}

function connect(){
  for(let a=0;a<particles.length;a++){
    for(let b=a;b<particles.length;b++){
      const dx=particles[a].x-particles[b].x;
      const dy=particles[a].y-particles[b].y;
      const distance=Math.sqrt(dx*dx+dy*dy);

      if(distance<120){
        const opacity=1-(distance/120);
        ctx.strokeStyle="rgba(0,255,255,"+opacity*0.4+")";
        ctx.beginPath();
        ctx.moveTo(particles[a].x,particles[a].y);
        ctx.lineTo(particles[b].x,particles[b].y);
        ctx.stroke();
      }
    }
  }
}

function animate(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  particles.forEach(p=>{
    p.update();
    p.draw();
  });
  connect();
  requestAnimationFrame(animate);
}

init();
animate();

/* ================= LOGIN ================= */

function login(){
  const email=document.getElementById("email").value;
  const password=document.getElementById("password").value;

  const savedUser=JSON.parse(localStorage.getItem("user"));

  if(!savedUser){
    alert("Nenhuma conta encontrada. Crie uma.");
    return;
  }

  if(email===savedUser.email && password===savedUser.password){
    localStorage.setItem("loggedIn","true");
    window.location.href="calculator.html";
  }else{
    alert("Email ou senha incorretos");
  }
}

function forgotPassword(){
  const savedUser=JSON.parse(localStorage.getItem("user"));
  if(savedUser){
    alert("Sua senha é: " + savedUser.password);
  }else{
    alert("Nenhuma conta cadastrada.");
  }
}
</script>

</body>
</html>
